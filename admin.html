<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Jemi Fest — Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Raleway:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; overscroll-behavior: none; }

    body {
      min-height: 100dvh;
      background: #080810;
      font-family: 'Raleway', sans-serif;
      color: rgba(215,220,242,0.85);
      padding: max(env(safe-area-inset-top), 32px) 16px max(env(safe-area-inset-bottom), 32px);
      position: relative;
    }

    body::before {
      content: ''; position: fixed; inset: 0;
      background:
        radial-gradient(ellipse 60% 40% at 10% 20%, rgba(175,185,220,0.08) 0%, transparent 60%),
        radial-gradient(ellipse 50% 60% at 90% 80%, rgba(160,170,210,0.07) 0%, transparent 60%);
      pointer-events: none;
    }

    .container { max-width: 560px; margin: 0 auto; }

    header { text-align: center; margin-bottom: 32px; }

    .eyebrow {
      font-size: 0.6rem; letter-spacing: 5px; text-transform: uppercase;
      color: rgba(175,180,215,0.5); margin-bottom: 8px;
    }

    h1 {
      font-family: 'Cinzel', serif;
      font-size: clamp(1.8rem, 7vw, 2.6rem);
      background: linear-gradient(135deg, #d0d0e0, #ffffff, #b0b0cc, #e4e8ff, #ffffff, #c0c4dc, #ffffff);
      background-size: 200% auto;
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      animation: silverShine 3.5s linear infinite;
    }
    @keyframes silverShine { 0% { background-position: 0% center; } 100% { background-position: 200% center; } }

    .divider { display: flex; align-items: center; gap: 10px; margin: 14px auto; max-width: 200px; }
    .divider-line { flex: 1; height: 1px; background: linear-gradient(90deg, transparent, rgba(195,200,230,0.3), transparent); }
    .divider-diamond { width: 5px; height: 5px; background: rgba(215,220,248,0.85); transform: rotate(45deg); box-shadow: 0 0 7px rgba(195,205,240,0.5); }

    /* Stat */
    .stat-card {
      border-radius: 20px; padding: 2px;
      background: linear-gradient(135deg,
        rgba(255,255,255,0.75), rgba(195,205,238,0.52),
        rgba(225,228,248,0.68), rgba(255,255,255,0.82),
        rgba(182,194,230,0.50), rgba(255,255,255,0.78)
      );
      background-size: 300% 300%;
      animation: holoShift 7s ease infinite;
      margin-bottom: 20px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.5);
    }
    @keyframes holoShift { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

    .stat-inner {
      background: linear-gradient(160deg, #141420, #0c0c18);
      border-radius: 18px; padding: 22px 24px;
      display: flex; align-items: center; gap: 16px;
    }

    .stat-icon {
      width: 44px; height: 44px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
    }
    .stat-icon svg { width: 100%; height: 100%; }

    .stat-label {
      font-size: 0.55rem; letter-spacing: 4px; text-transform: uppercase;
      color: rgba(170,175,208,0.38); display: block; margin-bottom: 2px;
    }
    .stat-count {
      font-family: 'Cinzel', serif; font-size: 2.2rem; font-weight: 900;
      background: linear-gradient(135deg, #c0c8e0, #ffffff, #b4bcd8);
      background-size: 200% auto;
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      animation: silverShine 3.5s linear infinite; line-height: 1;
    }

    /* List header */
    .list-header {
      font-size: 0.55rem; letter-spacing: 4px; text-transform: uppercase;
      color: rgba(170,175,208,0.38); margin-bottom: 10px; padding-left: 4px;
      display: flex; align-items: center; gap: 8px;
    }
    .list-header svg { flex-shrink: 0; }

    #lista { list-style: none; display: flex; flex-direction: column; gap: 8px; }

    #lista li {
      background: rgba(255,255,255,0.033);
      border: 1px solid rgba(195,200,230,0.1);
      border-radius: 12px; padding: 14px 16px;
      display: flex; align-items: center; gap: 12px;
      transition: background 0.2s, border-color 0.2s;
      animation: slideIn 0.3s ease both;
      /* área táctil cómoda */
      min-height: 52px;
    }

    @keyframes slideIn { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }

    .li-num {
      width: 28px; height: 28px; border-radius: 50%;
      background: rgba(195,200,230,0.1);
      border: 1px solid rgba(195,200,230,0.14);
      display: flex; align-items: center; justify-content: center;
      font-size: 0.68rem; color: rgba(175,180,215,0.5);
      flex-shrink: 0; font-family: 'Cinzel', serif;
    }

    .li-name { font-size: 0.95rem; color: rgba(215,220,242,0.85); letter-spacing: 0.3px; }

    .li-tag {
      margin-left: auto;
      font-size: 0.55rem; letter-spacing: 2px; text-transform: uppercase;
      color: rgba(185,195,230,0.5);
      background: rgba(185,195,230,0.07);
      border: 1px solid rgba(185,195,230,0.14);
      border-radius: 6px; padding: 4px 9px;
      white-space: nowrap;
    }

    .empty {
      text-align: center; padding: 40px 20px;
      color: rgba(170,175,210,0.25); font-size: 0.85rem; letter-spacing: 1px;
    }
  </style>
</head>

<body>
  <div class="container">
    <header>
      <div class="eyebrow">· Invitaciones ·</div>
      <h1>Jemi Fest</h1>
      <div class="divider">
        <div class="divider-line"></div>
        <div class="divider-diamond"></div>
        <div class="divider-line"></div>
      </div>
    </header>

    <div class="stat-card">
      <div class="stat-inner">
        <div class="stat-icon">
          <!-- Icono personas SVG -->
          <svg viewBox="0 0 44 44" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="15" cy="14" r="5.5" stroke="rgba(200,210,240,0.65)" stroke-width="1.7"/>
            <path d="M4 34 Q4 26 15 26 Q26 26 26 34" stroke="rgba(200,210,240,0.65)" stroke-width="1.7" stroke-linecap="round"/>
            <circle cx="30" cy="13" r="4" stroke="rgba(200,210,240,0.4)" stroke-width="1.4"/>
            <path d="M26 33 Q26.5 28 32 28 Q38 28 38.5 33" stroke="rgba(200,210,240,0.4)" stroke-width="1.4" stroke-linecap="round"/>
          </svg>
        </div>
        <div>
          <span class="stat-label">Confirmados</span>
          <div class="stat-count" id="count">0</div>
        </div>
      </div>
    </div>

    <div class="list-header">
      <svg width="10" height="10" viewBox="0 0 10 10" fill="rgba(215,220,248,0.7)">
        <path d="M5 0.5 L5.9 3.6 L9 5 L5.9 6.4 L5 9.5 L4.1 6.4 L1 5 L4.1 3.6 Z"/>
      </svg>
      Lista de asistentes
    </div>
    <ul id="lista"></ul>
  </div>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

    const supabase = createClient(
      'https://ptchhofliossseoumvpy.supabase.co',
      'sb_publishable_ROO_04tmg0D0zL_TRF4mxA_GtR6fvkc'
    );

    const ul = document.getElementById("lista");
    const countEl = document.getElementById("count");

    async function cargarAsistentes() {
      ul.innerHTML = '<div class="empty">Cargando...</div>';

      const { data, error } = await supabase
        .from('asistentes')
        .select('nombre, created_at')
        .eq('asiste', true)
        .order('created_at', { ascending: true });

      if (error) {
        console.error(error);
        ul.innerHTML = '<div class="empty">Error al cargar los datos</div>';
        return;
      }

      countEl.textContent = data.length;

      if (data.length === 0) {
        ul.innerHTML = '<div class="empty">Aún no hay confirmaciones</div>';
      } else {
        ul.innerHTML = '';
        data.forEach((row, i) => {
          const li = document.createElement("li");
          li.style.animationDelay = (i * 0.05) + 's';
          li.innerHTML = `
            <div class="li-num">${i + 1}</div>
            <span class="li-name">${row.nombre}</span>
            <span class="li-tag">Confirmado</span>
          `;
          ul.appendChild(li);
        });
      }
    }

    cargarAsistentes();

    // Actualización en tiempo real
    supabase
      .channel('asistentes-changes')
      .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'asistentes' }, () => {
        cargarAsistentes();
      })
      .subscribe();
  </script>
</body>
</html>
